    ## ¿Qué es?

    La **oferta más conveniente** es aquella que obtiene el **mejor valor por dinero**, considerando no solo el precio, sino
    también la calidad técnica y otras variables establecidas en el pliego.


    ## ¿Cómo se elige?

    🔍 **Proceso en 2 etapas:**


    1️⃣ **"Cumple o No Cumple"** - Se evalúan requisitos mínimos obligatorios del pliego. Solo avanzan los que cumplen.


    2️⃣ **"Por Puntaje"** - Entre oferentes que pasaron la 1ª etapa, se califica según criterios de evaluación (precio, plazo,
    experiencia, etc.) establecidos previamente en el pliego.


    ⚠️ **Importante:** Los requisitos evaluados por puntaje NO pueden ser causales de descalificación en esta segunda etapa.


    📌 **Base legal:** Art. 263 RGLOSNCP - Método de evaluación de ofertas.'
