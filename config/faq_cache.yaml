  respuesta: '# 🤖 ¿Qué es el RUP?


    El **RUP (Recurso de Apelación ante el SERCOP)** es el mecanismo de impugnación que permite a los proveedores o participantes
    cuestionar decisiones tomadas por las entidades contratantes en procesos de compra pública.


    ## 📋 ¿Para qué sirve?


    ✅ Recurrir decisiones de la entidad contratante que consideres injustas o ilegales

    ✅ Solicitar al SERCOP revise y revoque actos administrativos

    ✅ Defender tus derechos como proveedor o participante en licitaciones

    ✅ Cuestionar bases, evaluaciones, adjudicaciones o rechazos


    ## ⏱️ Plazo importante

    Tienes **5 días hábiles** desde la notificación para presentar el RUP ante el SERCOP, quien es la autoridad competente
    para resolver.


    📌 Base legal: Art. 342 RGLOSNCP'
