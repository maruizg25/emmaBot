    La **lista corta** es un documento que elabora la entidad contratante con los **candidatos preseleccionados** que cumplen
    los requisitos mínimos para participar en la siguiente fase de una contratación de servicios de consultoría.


    ## 🎯 Características principales:


    📋 **Preselección:** Resultado de la evaluación inicial de propuestas técnicas y económicas

    ✅ **Requisitos:** Solo avanzan quienes cumplan con los criterios mínimos de elegibilidad

    🔄 **Siguiente fase:** Los listados avanzan a presentación de propuestas finales, negociación o entrevistas


    ## ⚠️ Importante:


    La normativa que compartiste se refiere a **listas referenciales de riesgos** en obras (EPC), no exactamente a listas
