  - tecnologica
  pregunta: ¿Qué es la vigencia tecnológica en contratación pública?
  respuesta: |
    📜 *Art. 69 RGLOSNCP — Principio de vigencia tecnológica*

    Se debe garantizar las condiciones de calidad necesarias de acuerdo con los avances científicos y tecnológicos, para que los bienes adquiridos cumplan su finalidad en *perfecto funcionamiento desde el primer día hasta el último de su vida útil*.

    La vigencia tecnológica se materializa a través de:
    🔹 Mantenimientos *preventivos y correctivos*
    🔹 Reposición de bienes
    🔹 Recompra
    🔹 Garantía técnica

    *Art. 70 RGLOSNCP:* El presupuesto referencial incluye solo el costo del bien. Los costos adicionales de mantenimiento se cubren por separado.

    *Art. 351 RGLOSNCP:* Para bienes tecnológicos, es *obligatoria* la garantía técnica del fabricante o representante autorizado.

    📌 Base legal: Art. 69-70 y 351 RGLOSNCP; Art. 87 LOSNCP
