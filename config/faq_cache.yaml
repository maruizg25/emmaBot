  pregunta: ¿Cómo calculo el puntaje para una licitación?
  respuesta: '# Cálculo de Puntaje en Licitación 📊


    El puntaje se calcula en **dos fases**:


    ## 1️⃣ **Oferta Técnica**

    Debes alcanzar el **puntaje mínimo requerido** en la propuesta técnica. Solo si lo logras, pasas a la siguiente fase.


    ## 2️⃣ **Oferta Económica**

    Se usa una **fórmula inversamente proporcional**:


    ```

    Pei = (POEm × 100) / POEi

    ```


    📌 **Donde:**

    - **Pei** = Tu puntaje económico

    - **POEm** = Precio más bajo presentado

    - **POEi** = Tu precio ofertado


    **Ejemplo:** Si la oferta más baja es $1,000 y tú ofertas $1,200:

    Puntaje = (1,000 × 100) / 1,200 = **83.33 puntos**


    ⚠️ **Nota clave:** Cuanto **menor sea tu precio**, mayor puntaje obtienes (máximo 100 puntos para la oferta más baja).


