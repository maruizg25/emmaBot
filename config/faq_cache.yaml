  - procedimiento
  pregunta: ¿Cómo se elige entre SIE y Licitación?
  respuesta: |
    📜 *Art. 74 RGLOSNCP — Mejor Valor por Dinero*

    Para seleccionar entre SIE y Licitación, la entidad contratante deberá determinar:

    1️⃣ Si los bienes o servicios son *estandarizados y de adquisición frecuente*
    2️⃣ Si existe un *mercado competitivo* de proveedores calificados
    3️⃣ Si el *precio refleja por sí solo* el mejor valor por dinero o si deben priorizarse otros atributos

    ✅ Cuando el precio más bajo y el mercado competitivo representen el mejor valor → *SIE*
    ❌ En caso contrario → *Licitación*
    🏗️ Para obras → *siempre Licitación*

    📌 Fuente: Art. 74 RGLOSNCP vigente
  frecuencia: 0

