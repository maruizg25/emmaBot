  pregunta: ¿Qué es el VAE (Valor Agregado Ecuatoriano)?
  respuesta: |
    El *VAE (Valor Agregado Ecuatoriano)* tiene dos dimensiones en contratación pública:

    *1️⃣ Umbral VAE del procedimiento:*
    Es el porcentaje *mínimo* de valor agregado ecuatoriano que debe cumplir una oferta para ser considerada ecuatoriana y acceder a las *preferencias* de la normativa vigente. Lo determina el SERCOP.

    *2️⃣ VAE de una oferta:*
    Es el porcentaje de valor agregado ecuatoriano *declarado por el oferente*.

    🔹 El SERCOP realiza la *verificación* del VAE de cada oferta
    🔹 Si la oferta cumple el umbral → accede a márgenes de preferencia

    📌 Base legal: Resoluciones SERCOP sobre metodología VAE
  frecuencia: 0


- keywords:
