  pregunta: ¿Cómo se adjudica una subasta inversa electrónica?
  respuesta: '# 🏆 Adjudicación de Subasta Inversa Electrónica


    **¿Cuándo se usa?** Cuando necesitas adquirir bienes/servicios estandarizados por más de USD $10.000, el precio más bajo
    es el único criterio de adjudicación y no puedes usar catálogo electrónico.


    **Proceso de Adjudicación:**

    ✅ Se adjudica al participante que oferta el **precio más bajo**

    ✅ Puede haber **adjudicación parcial o por ítems** (si los pliegos lo permiten)

    ✅ Si el ganador no celebra contrato, se convoca al siguiente mejor postor (adjudicatario fallido)


