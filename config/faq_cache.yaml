  respuesta: '# ¿Qué es la Licitación en Contratación Pública? 🏛️


    La **licitación** es un procedimiento de contratación pública mediante el cual una entidad estatal convoca públicamente
    a proveedores interesados para que presenten ofertas competitivas y así seleccionar la más conveniente.


    ## Características principales:

    📌 **Concurso público** abierto a todos los proveedores habilitados en el RUP

    💰 **Se aplica** cuando el presupuesto referencial supera USD $10.000

    🔍 **Transparencia**: se realiza a través del Portal de Contratación Pública

    ⚖️ **Competencia**: permite comparar ofertas y elegir la mejor propuesta


    Es un mecanismo que garantiza **equidad, transparencia y eficiencia** en el gasto público, permitiendo que múltiples oferentes
    compitan por los contratos estatales.


