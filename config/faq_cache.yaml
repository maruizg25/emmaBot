  respuesta: '# 🤔 Diferencia entre Cotización y Menor Cuantía


    **Cotización:**

    📌 Es una solicitud de presupuesto que hace la entidad contratante a proveedores para conocer precios del mercado. Se usa
    durante la fase de diseño de los procesos de contratación para establecer el **presupuesto referencial**.


    **Menor Cuantía:**

    📌 Es un **procedimiento de contratación** (tipo de proceso) aplicable cuando el monto estimado está por debajo de ciertos
    umbrales. Se rige por reglas simplificadas respecto a los procedimientos de mayor cuantía.


    **La diferencia clave:**

    ✅ **Cotización** = herramienta para fijar precios antes de licitar

    ✅ **Menor cuantía** = modalidad de procedimiento para contratar montos bajos


    La cotización te ayuda a determinar si usarás menor cuantía u otro procedimiento según el presupuesto referencial que
    resulte.


