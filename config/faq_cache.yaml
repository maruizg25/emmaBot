    La duración de una licitación **varía según el tipo de procedimiento**. No existe un plazo único fijo, ya que depende
    de:


    🔹 **Tipo de procedimiento** (licitación pública, subasta inversa, etc.)

    🔹 **Complejidad** del objeto de contratación

    🔹 **Etapas del proceso** (convocatoria, presentación de ofertas, evaluación, adjudicación)

    🔹 **Tiempos mínimos y máximos** establecidos en el pliego técnico


    En el caso específico de la **Subasta Inversa Electrónica (SIE)**, la fase de puja dura entre **15 a 60 minutos en un
    mismo día**, establecida por la entidad contratante.


    El proceso completo desde la publicación hasta la suscripción del contrato generalmente toma **varios meses**, dependiendo
    de la planificación de la entidad contratante y el cronograma establecido en el pliego.


    📌 **Base legal:** Art. 226-230 RGLOSNCP; Manual SOCE — Subasta Inversa Electrónica


