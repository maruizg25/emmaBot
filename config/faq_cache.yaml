    📜 *Art. 47 LOSNCP — Subasta Inversa Electrónica*

    Para la adquisición de bienes y servicios que no consten en el Catálogo Electrónico, las entidades contratantes podrán realizar subastas inversas electrónicas en las cuales los proveedores de bienes y servicios pujan hacia la baja el precio ofertado, por medios electrónicos a través del Portal de Contratación Pública, en el cual quedarán registrados los resultados de la puja y el proveedor adjudicado.

    El objetivo de este procedimiento es *obtener el menor precio*.

    De existir una sola oferta técnica calificada, no se realizará la puja y en su lugar se efectuará la *sesión única de negociación* entre la entidad contratante y el oferente.

