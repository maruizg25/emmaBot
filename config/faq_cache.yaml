  - dinero
  pregunta: ¿Qué es el valor por dinero en contratación pública?
  respuesta: |
    📜 *Art. 74 RGLOSNCP — Mejor Valor por Dinero*

    El principio de mejor valor por dinero se aplica de forma *transversal en todos los procedimientos* de contratación pública: planificación, selección del procedimiento, evaluación de ofertas y ejecución contractual.

    La entidad contratante debe identificar la alternativa que *maximice los resultados del gasto público*, considerando no solo el precio, sino también:
    🔹 Calidad y sostenibilidad
    🔹 Innovación
    🔹 Costos del ciclo de vida
    🔹 Desempeño y funcionalidad

