  pregunta: ¿Qué es la contratación pública?
  respuesta: |
    La *contratación pública* es el proceso legal mediante el cual el Estado ecuatoriano adquiere bienes, servicios, obras o consultoría usando fondos públicos.

    🔹 Toda compra del Estado debe hacerse a través del *Portal ComprasPúblicas* (SOCE)
    🔹 Las reglas las establece la *LOSNCP* (Ley Orgánica del Sistema Nacional de Contratación Pública)
    🔹 El *SERCOP* supervisa, regula y controla todos los procesos

    En 2024, el Estado ecuatoriano ejecutó más de *$4.000 millones* en contratos públicos.

    🌐 Portal: www.compraspublicas.gob.ec
    📌 Base legal: Art. 1 LOSNCP
  frecuencia: 0
- keywords:
  - buscar
  - procesos
  - portal
  pregunta: ¿Cómo busco procesos de contratación en el portal?
  respuesta: |
    Para buscar procesos en el *Portal ComprasPúblicas*:

    1️⃣ Ingresa a *www.compraspublicas.gob.ec*
    2️⃣ Selecciona *"Procesos"* en el menú principal
    3️⃣ Usa los filtros: tipo de proceso, entidad, fecha, estado, provincia
    4️⃣ Haz clic en un proceso para ver el pliego y las bases

    💡 No necesitas cuenta para *ver* los procesos. Solo te registras si quieres *participar*.

    📌 Todos los procesos son públicos por mandato del Art. 13 LOSNCP (principio de transparencia).
  frecuencia: 0
- keywords:
  - paga
  - contrato
  pregunta: ¿Qué hago si la entidad pública no me paga?
  respuesta: |
    Si una entidad pública no te paga dentro del plazo establecido en el contrato, tienes derecho a:

    ⏱ *Intereses por mora:* la entidad debe pagarte interés legal desde el día del vencimiento
    📋 *Reclamo administrativo:* presenta un escrito formal a la máxima autoridad de la entidad
    ⚖️ *Recurso de apelación:* ante el mismo órgano o el superior jerárquico
    🏛️ *Acción judicial:* si el reclamo administrativo no prospera, puedes ir a la vía judicial

    💡 Guarda siempre copia del contrato, actas de entrega y facturas como respaldo.

    📌 Base legal: Art. 74 LOSNCP; Art. 341-345 RGLOSNCP.
  frecuencia: 0
- keywords:
  - infima
  - cuantia
  pregunta: ¿Qué es la ínfima cuantía?
  respuesta: |
    La *ínfima cuantía* es el proceso más simple de contratación pública. Se usa para compras urgentes o de bajo monto.

    💰 *Monto máximo:* hasta *USD $10,000* — monto fijo (Art. 50 LOSNCP)
    📋 *Sin proceso formal:* no requiere publicación ni concurso de oferentes
    🧾 *Documento habilitante:* solo factura o nota de venta
    ⚠️ *Limitación:* no puede usarse para eludir otros procesos ni fraccionarse

    💡 Ideal para compras de papelería, pequeños servicios o materiales de emergencia.

    📌 Base legal: Art. 50 LOSNCP; Art. 269 RGLOSNCP.
  frecuencia: 0
- keywords:
  - presupuesto
  - referencial
  pregunta: ¿Qué es el presupuesto referencial?
  respuesta: |
    El *presupuesto referencial* es el valor estimado que la entidad pública calcula antes de iniciar un proceso de contratación.

    🔹 Define qué *tipo de proceso* aplica (según la LOSNCP vigente)
    🔹 Se publica en el Portal ComprasPúblicas junto con los pliegos
    🔹 Los oferentes no pueden superar este monto en su oferta económica
    🔹 Debe basarse en estudios de mercado, cotizaciones previas o costos históricos

    💡 No es el precio final — es el techo máximo. La adjudicación puede ser menor.

    📌 Base legal: Art. 23 LOSNCP; Art. 23-24 RGLOSNCP.
