    🔹 **SIE** = bienes/servicios normalizados, sin límite (Art. 47)

    🔹 **Licitación** = contratos de gran monto (Art. 48)

    🔹 **Feria Inclusiva** = proveedores EPS/MIPYMES (Art. 51)

    ⚠️ Menor cuantía y cotización eliminados por reforma octubre 2025.


    ⚠️ **Nota especial**: Existen excepciones en casos especiales (alimentos en zonas rurales/fronterizas, combustibles) donde
    se pueden hacer varias ínfimas cuantías que superen USD $10,000.


