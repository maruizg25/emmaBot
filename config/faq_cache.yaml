  pregunta: ¿Qué es la puja en contratación pública?
  respuesta: |
    La *puja* es la etapa competitiva de la *Subasta Inversa Electrónica (SIE)* donde los proveedores habilitados compiten ofertando precios a la baja en tiempo real.

    🔹 El sistema oculta las identidades (Proveedor 1, Proveedor 2…)
    🔹 Solo el Gestor del proceso ve la puja en tiempo real
    🔹 Gana quien oferte el precio más bajo al cierre
    🔹 La puja tiene una duración definida (generalmente 15-30 min)

    💡 La puja *solo existe en SIE* — no en licitación, cotización ni menor cuantía.

    📌 Base legal: Art. 47 LOSNCP
    📌 Manual SOCE — Subasta Inversa Electrónica p.72
