  pregunta: ¿En qué procesos existe puja?
  respuesta: |
    La *puja existe únicamente en la Subasta Inversa Electrónica (SIE)*.

    En la SIE los proveedores habilitados compiten ofertando precios *a la baja en tiempo real*. El sistema oculta las identidades (Proveedor 1, Proveedor 2…) y solo el Gestor del proceso ve la puja en tiempo real.

    ❌ Los demás procesos *NO tienen puja*:
    🔹 Licitación — evaluación de ofertas técnicas y económicas
    🔹 Cotización — comparación de propuestas
    🔹 Menor cuantía — invitación directa
    🔹 Ínfima cuantía — compra directa con factura

    📌 Base legal: Art. 47 LOSNCP
