  pregunta: ¿Cuáles son los procedimientos de contratación vigentes según el Reglamento?
  respuesta: |
    📜 *Art. 17 RGLOSNCP — Procedimientos de Contratación Vigentes*

    Las entidades contratantes deben usar las herramientas del Portal de Contratación Pública:

    *1. Procedimientos Dinámicos:*
    a) Catálogo Electrónico
    b) Subasta Inversa

    *2. Procedimientos de Régimen Común:*
    a) Licitación
    b) Concurso público de consultoría
    c) Feria inclusiva
    d) Ínfima cuantía

    *3. Procedimientos de Régimen Especial* (flujo único, salvo excepciones)

    *4. Procedimientos Especiales:*
    a) Arrendamiento de bienes inmuebles
    b) Contrataciones en situación de emergencia
    c) Compra corporativa de alimentación escolar
    d) Adquisición de combustible para vehículos

    ⚠️ *Menor cuantía y cotización ya no existen* — fueron eliminados por la reforma LOSNCP octubre 2025.

    📌 Fuente: Art. 17 RGLOSNCP vigente
  frecuencia: 0

- keywords:
