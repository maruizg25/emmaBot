  pregunta: ¿Cuáles son los tipos de contratación pública?
  respuesta: |
    Los *tipos de contratación pública* vigentes en Ecuador (LOSNCP reforma octubre 2025):

    🔹 *Ínfima Cuantía* — compras urgentes de bajo monto (Art. 50)
    🔹 *Subasta Inversa Electrónica (SIE)* — bienes y servicios normalizados (Art. 47)
    🔹 *Licitación* — contratos de gran monto (Art. 48)
    🔹 *Feria Inclusiva* — proveedores EPS y MIPYMES (Art. 51)
    🔹 *Catálogo Electrónico* — compra directa desde convenios marco (Art. 43)
    🔹 *Concurso Público de Consultoría* — servicios de consultoría (Art. 42)
    🔹 *Régimen Especial* — seguridad, defensa, emergencia y casos especiales

    ⚠️ *Menor cuantía y cotización fueron eliminados* por la reforma LOSNCP octubre 2025.

    📌 El proceso adecuado depende del *monto, objeto y naturaleza* de la contratación.
    Base legal: LOSNCP vigente.
