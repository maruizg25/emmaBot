  respuesta: '# ¿Qué es la Contratación de Consultoría?


    La consultoría es un **servicio especializado** que las entidades contratantes pueden adquirir a través de los procedimientos
    de contratación pública. Se trata de prestaciones de carácter profesional y técnico que buscan atender necesidades institucionales
    específicas.


    🎯 **Características principales:**

    • Actividades profesionales especializadas y no normalizadas

    • Desarrollo temporal de labores técnicas o asesoría

    • Prestadores pueden ser personas naturales o jurídicas inscritas en el RUP

    • Pueden estar sujetas a resultados específicos

    • Se contratan conforme a las necesidades institucionales


    💡 Los servicios de consultoría se pueden adquirir simultáneamente con bienes u obras en los procedimientos de contratación
    pública, siempre que se determine correctamente el Código de Producto (CPC) que represente el mayor porcentaje del presupuesto
    referencial.


    📌 Base legal: Art. 1 y 27 RGLOSNCP; LOSNCP'
