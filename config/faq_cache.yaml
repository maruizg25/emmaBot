    *2️⃣ Fase Precontractual:*
    🔹 Publicación del procedimiento en el portal
    🔹 Recepción y evaluación de ofertas
    🔹 Adjudicación (Art. 30 LOSNCP)

    *3️⃣ Fase Contractual:*
    🔹 Suscripción del contrato (máx. 15 días — Art. 80 LOSNCP)
    🔹 Ejecución y fiscalización (Art. 92 LOSNCP)
    🔹 Recepción y liquidación (Art. 93-94 LOSNCP)

