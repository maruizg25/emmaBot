    ✅ **Por causales legales** - Las establecidas en la LOSNCP (Art. 108)

    ✅ **Por mutuo acuerdo** - Entre entidad contratante y contratista


    ## Procedimiento:


    🔹 Entidad contratante notifica por escrito al contratista

    🔹 Se sigue el procedimiento establecido en la LOSNCP

    🔹 SERCOP facilita herramienta informática para tramitar

    🔹 Se registra en el sistema de contratación pública


