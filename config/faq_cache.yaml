    Sin embargo, sí existen **umbrales que definen cuándo es OBLIGATORIO licitar**:


    🔹 **Ínfima cuantía** = hasta USD $1,350 (puede contratarse directamente)

    🔹 **Menor cuantía** = USD $1,350 a USD $10,000 (procedimientos simplificados)

    🔹 **Cuantía superior** = arriba de USD $10,000 (licitación estándar u otras modalidades)


    ⚠️ **Nota especial**: Existen excepciones en casos especiales (alimentos en zonas rurales/fronterizas, combustibles) donde
    se pueden hacer varias ínfimas cuantías que superen USD $10,000.


