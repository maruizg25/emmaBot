  pregunta: ¿Qué es la Economía Popular y Solidaria (EPS) en contratación?
  respuesta: '# 🤝 Economía Popular y Solidaria (EPS) en Contratación


    La **EPS** es un sector económico que agrupa a organizaciones de ciudadanos que buscan satisfacer necesidades mediante
    la producción, intercambio y consumo de bienes/servicios de forma cooperativa y solidaria. En contratación pública, es
    prioritario promover su participación.


    ## 📌 Obligación en Contrataciones:


    🔹 Los contratistas ganadores **deben adquirir al menos el 35%** de productos/servicios de proveedores EPS y AFC (Agricultura
    Familiar y Campesina)

    🔹 Este porcentaje aplica **en cada orden de entrega** derivada de la orden de compra

