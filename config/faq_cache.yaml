    los demás requisitos que establezca SERCOP.


    **Requisitos clave:**

    ✅ Todos los integrantes del consorcio deben ser legalmente capaces para contratar

    ✅ El procurador común debe estar expresamente facultado para representar al consorcio

    ✅ Deben usar únicamente el formulario oficial de SERCOP

    ✅ El formulario debe estar debidamente suscrito por todos los partícipes


