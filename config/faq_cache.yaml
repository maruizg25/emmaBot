  pregunta: ¿Qué es una feria inclusiva y quién puede participar?
  respuesta: '# 🛍️ Feria Inclusiva - Definición y Participantes


    ## ¿Qué es?

    La feria inclusiva es un procedimiento de contratación pública diseñado para **favorecer a proveedores de economía popular
    y solidaria**, priorizando sectores vulnerables y economías locales. Se realiza en un ámbito territorial específico (cantonal
    o provincial).


    ## ✅ ¿Quién puede participar?

    Deben estar **habilitados en el RUP** y pertenecer a:


    📌 **Orden de prioridad:**

    1️⃣ Organizaciones de economía popular y solidaria (comunitarias, asociativas, cooperativas)

    2️⃣ Unidades económicas populares

    3️⃣ Artesanos

    4️⃣ Agricultura familiar y campesina

    5️⃣ Emprendedores (énfasis en mujeres formalizadas)

    6️⃣ Micro y pequeñas empresas


    ## 📍 Requisito territorial

    Los proveedores deben estar **domiciliados en el cantón** donde se produce o entrega el bien/servicio, salvo que la entidad
    declare inexistencia de capacidad cantonal (entonces se amplía a nivel provincial).


