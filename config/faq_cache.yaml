    Alcanzar la **mejor combinación entre beneficios y costos**, buscando **eficacia, eficiencia y calidad** en obras, bienes
    o servicios. El pliego también debe garantizar **trato igualitario** para todos los oferentes, sin discriminar ni crear
    barreras injustas.


    Los pliegos regulan todas las fases: precontractual, contractual, suscripción y ejecución del contrato.


