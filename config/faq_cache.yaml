  pregunta: ¿Cuál es el monto para contratación directa de consultoría?
  respuesta: '# 💼 Contratación Directa de Consultoría


    Según la normativa vigente, **no existe un monto específico** para contratar consultoría por contratación directa. Lo
    que existe son **casos excepcionales autorizados**:


    ✅ **Se permite contratación directa de consultoría cuando:**

    • Honorarios de expertos para proyectos de investigación científica

    • Servicios relacionados con actividades de investigación, desarrollo tecnológico

    • Instituciones autorizadas: universidades, centros de investigación (según Código de Economía Social de Conocimientos)


    ❌ **NO se puede usar contratación directa para:**

    • Servicios de consultoría catalogados (bienes/servicios que están en catálogos oficiales)

    • Consultoría general fuera de proyectos de investigación


    Para otros casos de consultoría, debes usar **procedimientos competitivos** (licitación, catálogo electrónico)
    según el monto que corresponda.


    📌 **Base legal:** Art. 160 RGLOSNCP - Régimen especial de contratación directa'
