    **📋 Pasos principales:**

    🔹 Estar habilitado como proveedor en el sistema SOCE

    🔹 Recibir invitación de la entidad contratante

    🔹 Presentar oferta económica inicial en la fecha establecida

    🔹 Participar en la puja (fase de pujas) rebajando progresivamente tu precio


    **💰 Durante la puja:**

    🔹 Compites contra otros oferentes en tiempo real

    🔹 Puedes rebajar tu oferta hasta el 50% sin restricción

    🔹 Para reducir más del 50%, debes emitir varias ofertas progresivas

    🔹 El sistema te mostrará si tu oferta va ganando

    🔹 Eres responsable de la información que emites


    **⚖️ Casos especiales:**

    Si eres el único proveedor calificado, la entidad negocia directamente contigo en 3 días. Si hay varios calificados pero
    solo tú presentas oferta inicial, también entra en negociación directa.


