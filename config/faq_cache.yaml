  pregunta: ¿Cuándo debo renovar mi RUP?
  respuesta: '# Renovación del RUP ⏰


    El **RUP (Registro Único de Proveedores) tiene vigencia de 2 años** desde su otorgamiento. Debes renovarlo **antes de
    que venza** para continuar participando en procesos de contratación pública.


    ✅ **Pasos clave:**

    🔹 Ingresa al portal del SERCOP (www.sercop.gob.ec)

    🔹 Accede con tu usuario y contraseña

    🔹 Completa el formulario de renovación con datos actualizados

    🔹 Carga documentos vigentes (RUC, CIF, etc.)

    🔹 Paga la tarifa correspondiente (si aplica)


    ⚠️ **Importante:** Si tu RUP vence, **no podrás participar en licitaciones** hasta renovarlo. Se recomienda iniciar el
    trámite con **30 días de anticipación**.


