  respuesta: '# 📋 Impugnación de Calificación de Ofertas


    **Sí, puedes impugnar la calificación de ofertas.** El marco normativo de contratación pública ecuatoriana permite presentar
    recursos administrativos contra decisiones de calificación que consideres injustas o contrarias a la ley.


    🔑 **Puntos clave para tu impugnación:**

    • 📌 Debes demostrar que la calificación violó los criterios establecidos en el pliego

    • 📌 No se puede rechazar oferta por falta de "integridad" (es convalidable)

    • 📌 En metodología "Por puntaje", ningún parámetro de evaluación es causal de descalificación

    • 📌 En consultoría: la oferta técnica requiere mínimo 70 puntos para pasar a económica


    **Procedimiento:** Presenta tu recurso ante el SERCOP o la entidad contratante dentro de los plazos establecidos, fundamentando
    por qué la calificación incumplió la normativa o los criterios publicados.


    📌 **Base legal:** Art. 104 RGLOSNCP (principios de calificación) y Art. 184 RGLOSNCP (requisitos de ofertas)'
