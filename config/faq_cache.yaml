  pregunta: ¿Cuáles son los tipos de consultoría en la LOSNCP?
  respuesta: '# 📋 Tipos de Consultoría en la LOSNCP


    Según la normativa, existen **2 tipos principales**:


    ## 1️⃣ **CONSULTORÍA ESPECIALIZADA**

    Son servicios que requieren **dictamen o juicio profesional especializado**. Implican análisis técnico, recomendaciones
    y decisiones profesionales en temas específicos.


    ## 2️⃣ **SERVICIOS DE APOYO A LA CONSULTORÍA**

    Son servicios **auxiliares sin dictamen profesional**, como:

    ✅ Contabilidad

    ✅ Topografía y cartografía

    ✅ Aerofotogrametría

    ✅ Ensayos geotécnicos (sin interpretación)

    ✅ Computación y procesamiento de datos

    ✅ Uso de equipos especiales


    La diferencia clave: **¿Hay dictamen profesional?** Si sí → Consultoría. Si no → Apoyo a consultoría.


    📌 Base legal: Art. 32 RGLOSNCP'
