    **¿Qué es?** 🎯

    Es el proceso mediante el cual se **pone fin al negocio jurídico** y se agota la responsabilidad de ambas partes. Implica
    el cierre financiero y contable del contrato, determinando qué se debe pagar o recuperar.


    **¿Cuándo ocurre?** ⏰

    Se realiza especialmente en casos de **terminación unilateral** del contrato. Se establece el avance físico de obras/bienes/servicios
    y se hace el balance financiero final.


    **¿Qué incluye?** 📊

    • Liquidación financiera y contable

    • Cálculo de valores adeudados

    • Reajuste de anticipos no devengados

    • El contratista debe pagar en **máximo 10 días** desde notificación


    **Importante:** 🔔 La liquidación **no extingue todas las obligaciones contractuales**, solo agota la responsabilidad principal
    del contratista con la entidad.


